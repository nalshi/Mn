name = "api"
main = "src/index.js"
compatibility_date = "2026-07-21"

# ========================================================
# 🗄️ قاعدة البيانات D1
# استبدل database_name و database_id بقيم مشروعك الفعلية
# (تلقاها من: wrangler d1 list)
# ========================================================
[[d1_databases]]
binding = "DB"
# ⚠️ لسا لازم تحطها إنت: نفّذ أولاً
#   wrangler d1 create merchant-db
# وانسخ الاسم والـ id من نتيجة الأمر (أو من `wrangler d1 list`) هنا:
database_name = "nalsh-db"
database_id = "65f387d5-1a16-4811-bc14-1b95e91bd88b"

# ========================================================
# ⚙️ متغيرات عامة (غير حساسة) - يجوز وضعها هنا مباشرة
# ========================================================
[vars]
GITHUB_OWNER = "nalshi"
GITHUB_REPO = "Nynnl"

# 🔒 أمان: قائمة الدومينات المسموحة بالوصول (CORS). لو تركتها فاضية،
# يرجع السلوك القديم (*) بدون قيود.
# ⚠️ عدّل الدومين تحت ليكون دومين لوحة التاجر الفعلي عندك
ALLOWED_ORIGINS = "https://appi.dpdns.org"

# إعدادات Firebase العامة (Client Config) -  للنشر لأنها ليست أسرار
FCM_API_KEY = "AIzaSyCMXZAyWU6z8BfUbvG74LfVWaB36zs75E4"
FCM_AUTH_DOMAIN = "shiban-a2757.firebaseapp.com"
FCM_PROJECT_ID = "shiban-a2757"
FCM_SENDER_ID = "45283310547"
FCM_APP_ID = "1:45283310547:web:8470fdc9e635e74bd30d26"
FCM_VAPID_KEY = "BMLWrq3yDRYQvrwJybVidHXUNP6AcE6O5RNmSR9kSl-wfpfbtKwr6a6vXG2HfFye10xXRPT08iDjrtPbDGemD-c"

FIREBASE_DB_URL = "https://shiban-a2757-default-rtdb.europe-west1.firebasedatabase.app/"

# رابط الـ api.php القديم على Render (لمزامنة إعدادات التاجر مع النظام الموروث)
# ⚠️ حط هنا رابط سيرفس Render الفعلي (مثال: https://your-service.onrender.com/api.php)
API_PHP_URL = "https://api.nalsh.dpdns.org/api.php"

# ========================================================
# 🔐 أسرار حقيقية - لا تضعها هنا إطلاقاً كنص صريح!
# اضبطها عبر أوامر wrangler secret (تُشفَّر ولا تظهر بالكود):
#
#   wrangler secret put APP_SECRET_KEY
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put FIREBASE_CREDENTIALS_JSON
#   wrangler secret put FIREBASE_DB_SECRET
#   wrangler secret put INTERNAL_SYNC_KEY     ⚠️ ناقص تماماً - لازم تولّده الآن
#                                              وتحطه بنفس القيمة في Render أيضاً
#
# لو كانت هذي القيم موجودة سابقاً بملف wrangler.toml القديم كـ [vars]
# عادي، انقلها لأوامر secret put بدل ما تبقى نص صريح بالملف —
# هذا جزء من تقوية الأمان المطلوبة.
# ========================================================
